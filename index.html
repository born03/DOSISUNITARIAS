<!-- REEMPLAZA EL ESTILO Y LAS ÁREAS DE IMPRESIÓN -->
<style>
    @media screen {
        /* ... el resto de tu CSS anterior igual ... */
        
        /* REPARACIÓN: No usar display: none para impresión */
        #print-labels-container, #print-summary-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
        }
    }

    @media print {
        @page { margin: 0; size: letter; }
        body { background: white; margin: 0; padding: 0; }
        body * { visibility: hidden; }
        
        /* Solo mostramos lo que se está imprimiendo en ese momento */
        .printing-now, .printing-now * {
            visibility: visible !important;
            position: absolute !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            display: block !important;
        }
    }
</style>

<!-- Al final del body -->
<div id="print-labels-container"></div>
<div id="print-summary-container"></div>

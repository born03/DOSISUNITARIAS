<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL IV - SISTEMA UNIVERSAL</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --blue: #1a73e8; --red: #d32f2f; --green: #34a853; --gray: #5f6368; --border: #dadce0; }
        
        @media screen {
            body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: #f1f3f4; display: flex; height: 100vh; overflow: hidden; }
            
            .sidebar { width: 340px; background: white; border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.05); flex-shrink: 0; }
            .sidebar h2 { color: var(--blue); font-size: 18px; margin: 0 0 15px 0; border-bottom: 2px solid var(--blue); padding-bottom: 5px; }
            
            .form-group { margin-bottom: 12px; position: relative; }
            .form-group label { display: block; font-size: 10px; font-weight: bold; color: var(--gray); margin-bottom: 3px; }
            .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
            .form-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }

            #suggestions { position: absolute; width: 100%; background: white; border: 1px solid var(--border); border-radius: 0 0 4px 4px; z-index: 1000; max-height: 180px; overflow-y: auto; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .sug-item { padding: 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f1f1f1; }
            .sug-item:hover { background: #e8f0fe; }

            .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
            .tabs { background: white; display: flex; border-bottom: 1px solid var(--border); height: 50px; flex-shrink: 0; }
            .tab { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: var(--gray); cursor: pointer; }
            .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); background: #f8f9fa; }
            .tab.active-prn { color: var(--red); border-bottom: 3px solid var(--red); }
            .tab.active-lotes { color: var(--green); border-bottom: 3px solid var(--green); }

            .content-area { flex: 1; display: flex; overflow: hidden; }
            .srv-nav { width: 160px; background: white; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; }
            .srv-item { padding: 10px; font-size: 11px; border-radius: 6px; cursor: pointer; margin-bottom: 3px; display: flex; justify-content: space-between; }
            .srv-item.active { background: #e8f0fe; color: var(--blue); font-weight: bold; }

            .list-view { flex: 1; padding: 15px; overflow-y: auto; }
            .card { background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 10px; border-left: 5px solid var(--blue); }
            .card.prn { border-left-color: var(--red); }
            .card-h { padding: 8px 12px; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
            
            .btn-float { position: fixed; bottom: 20px; right: 20px; background: #ff9800; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; }

            .lote-table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
            .lote-table th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid var(--green); }
            .lote-table td { padding: 8px; border-bottom: 1px solid #eee; }
            .lote-input { width: 100%; border: 1px solid transparent; padding: 4px; border-radius: 4px; }
            .lote-input:focus { border-color: var(--green); background: #f1f8e9; }

            #print-zone { display: none; }
        }

        @media print {
            @page { margin: 5mm 5mm 5mm 15mm; size: letter; }
            body { background: white; }
            .sidebar, .tabs, .srv-nav, .btn-float, .no-print { display: none !important; }
            #print-zone { display: block !important; width: 100%; }
            .label-grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
            .label-cell { 
                width: 25%; height: 23.5mm; border: 0.1pt dashed #ccc; padding: 1.2mm; box-sizing: border-box; 
                vertical-align: top; border-bottom: 3mm solid white; 
            }
            .label-cell p { margin: 0; padding: 0; font-family: 'Calibri', sans-serif; font-size: 6pt; line-height: 1.0; white-space: nowrap; }
            .p-name { font-size: 5.5pt !important; font-weight: bold; }
            .bold { font-weight: bold !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar no-print">
        <h2>Registro Central IV</h2>
        <div class="form-group"><label>CAMA</label><input type="text" id="f-cama" data-next="f-nom"></div>
        <div class="form-group"><label>PACIENTE</label><input type="text" id="f-nom" style="text-transform:uppercase" data-next="f-med"></div>
        <div class="form-group"><label>MEDICAMENTO</label><input type="text" id="f-med" autocomplete="off"><div id="suggestions"></div></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="form-group"><label>DOSIS</label><input type="number" step="0.01" id="f-dos" data-next="f-hor"></div>
            <div class="form-group"><label>HORARIO</label><input type="text" id="f-hor" placeholder="08:00"></div>
        </div>
        <button id="btn-save" style="background:var(--blue); color:white; border:none; padding:12px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="guardarFirebase()">GUARDAR (ENTER)</button>
        
        <div style="margin-top:auto; font-size:10px; color:#999; text-align:center;">
            Cloud Sync Enabled | Redondeo 0.1 Activo
        </div>
    </div>

    <div class="main no-print">
        <div class="tabs">
            <div id="tab-DIARIA" class="tab active" onclick="setTab('DIARIA')">DIARIA</div>
            <div id="tab-PRN" class="tab" onclick="setTab('PRN')">PRN</div>
            <div id="tab-LOTES" class="tab" onclick="setTab('LOTES')">GESTIÓN DE LOTES</div>
        </div>
        <div class="content-wrapper">
            <div class="srv-nav" id="srv-list"></div>
            <div class="list-view" id="main-view"></div>
        </div>
        <button class="btn-float" onclick="imprimirEtiquetas()"><i class="material-icons">print</i> IMPRIMIR</button>
    </div>

    <div id="print-zone"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHHMG-hsYk1WRCn86K_Ot9WbjMX1Zf8xQ",
            authDomain: "dosishtml.firebaseapp.com",
            projectId: "dosishtml",
            storageBucket: "dosishtml.firebasestorage.app",
            messagingSenderId: "317130614255",
            appId: "1:317130614255:web:167de03096990415a1421a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.enablePersistence().catch(err => console.log("Persistence offline"));

        let CAT_DATA = [];
        let DOSIS_DATA = [];
        let currentTab = "DIARIA";
        let currentSrv = "TODOS";

        // Escuchar Catálogo
        db.collection("catalogo").onSnapshot(snap => {
            CAT_DATA = [];
            snap.forEach(doc => CAT_DATA.push({id: doc.id, ...doc.data()}));
            CAT_DATA.sort((a,b) => a.nombre.localeCompare(b.nombre));
            render();
        });

        // Escuchar Dosis
        db.collection("dosis").orderBy("ts", "desc").onSnapshot(snap => {
            DOSIS_DATA = [];
            snap.forEach(doc => DOSIS_DATA.push({id: doc.id, ...doc.data()}));
            render();
        });

        // Enters
        const ids = ["f-cama", "f-nom", "f-dos", "f-hor"];
        ids.forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    if(id === "f-hor") guardarFirebase();
                    else document.getElementById(document.getElementById(id).dataset.next).focus();
                }
            });
        });

        // Autocomplete
        const medInput = document.getElementById('f-med');
        const sugDiv = document.getElementById('suggestions');
        medInput.addEventListener('input', () => {
            const val = medInput.value.toUpperCase();
            sugDiv.innerHTML = "";
            if(!val) { sugDiv.style.display="none"; return; }
            const sugs = CAT_DATA.filter(m => m.nombre.includes(val)).slice(0, 5);
            if(sugs.length) {
                sugDiv.style.display="block";
                sugs.forEach(m => {
                    const d = document.createElement('div');
                    d.className = "sug-item"; d.innerText = m.nombre;
                    d.onclick = () => { medInput.value = m.nombre; sugDiv.style.display="none"; document.getElementById('f-dos').focus(); };
                    sugDiv.appendChild(d);
                });
            }
        });

        medInput.addEventListener('keydown', e => { if(e.key === 'Enter') { e.preventDefault(); sugDiv.style.display="none"; document.getElementById('f-dos').focus(); } });

        // Negocio
        function getSrv(c) {
            const n = parseInt(c);
            if(n >= 220 && n <= 245) return "ONCOLOGIA";
            if(n >= 501 && n <= 521) return "INFECTOLOGIA";
            if(n >= 522 && n <= 535) return "CIRUGIA";
            if(n >= 536 && n <= 542) return "GASTRO";
            if(n >= 543 && n <= 549) return "TRAUMATOLOGIA";
            if(n >= 550 && n <= 559) return "MED INT";
            return "URGENCIAS";
        }

        function guardarFirebase() {
            const cama = document.getElementById('f-cama').value;
            const nom = document.getElementById('f-nom').value.toUpperCase();
            const medNom = medInput.value.toUpperCase();
            const config = CAT_DATA.find(x => x.nombre === medNom);
            const dos = parseFloat(document.getElementById('f-dos').value);

            if(!cama || !nom || !config || isNaN(dos)) return alert("Revisa campos");

            // --- NUEVA LÓGICA DE REDONDEO VOL MED ---
            const volM_raw = dos / parseFloat(config.pre);
            const volM = Math.round(volM_raw * 10) / 10; // Redondeo a 0.1

            let volF = (dos / parseFloat(config.con));
            if(config.dil) volF = volF <= 1 ? 1 : (volF <= 3 ? 3 : Math.ceil(volF/5)*5);
            else volF = Math.round(volF * 10) / 10;

            db.collection("dosis").add({
                tipo: currentTab, cama, nombre: nom, medicamento: medNom, dosis: dos,
                horario: document.getElementById('f-hor').value, servicio: getSrv(cama),
                volM, volF, uni: config.uni, via: config.via, dil: config.dil, tie: config.tie,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });

            ["f-cama", "f-nom", "f-med", "f-dos", "f-hor"].forEach(i => document.getElementById(i).value = "");
            document.getElementById('f-cama').focus();
        }

        function render() {
            const view = document.getElementById('main-view');
            const nav = document.getElementById('srv-list');
            if(currentTab === "LOTES") { nav.innerHTML = ""; renderLotes(view); return; }
            const filtrados = DOSIS_DATA.filter(d => d.tipo === currentTab);
            const srvs = [...new Set(filtrados.map(d => d.servicio))].sort();
            nav.innerHTML = `<div class="srv-item ${currentSrv==='TODOS'?'active':''}" onclick="currentSrv='TODOS';render()"><span>TODOS</span> <b>${filtrados.length}</b></div>` +
                srvs.map(s => `<div class="srv-item ${currentSrv===s?'active':''}" onclick="currentSrv='${s}';render()"><span>${s}</span> <b>${filtrados.filter(x=>x.servicio===s).length}</b></div>`).join('');
            const final = currentSrv === 'TODOS' ? filtrados : filtrados.filter(d => d.servicio === currentSrv);
            const gps = {};
            final.forEach(d => { const k = `CAMA ${d.cama} - ${d.nombre}`; if(!gps[k]) gps[k]=[]; gps[k].push(d); });
            view.innerHTML = Object.keys(gps).sort().map(k => `
                <div class="card ${currentTab==='PRN'?'prn':''}">
                    <div class="card-h">${k} <i class="material-icons" style="font-size:16px; color:#ccc; cursor:pointer" onclick="eliminar('${gps[k][0].id}')">delete</i></div>
                    <table style="width:100%; padding:10px; font-size:13px;">
                        ${gps[k].map(m => `<tr><td><b>${m.medicamento}</b></td><td>${m.dosis}${m.uni}</td><td>${m.horario || '--'}</td></tr>`).join('')}
                    </table>
                </div>`).join('');
        }

        function renderLotes(cont) {
            cont.innerHTML = `
                <div class="card" style="padding:15px; border-left-color: var(--green);">
                    <div class="card-h" style="background:transparent; border:none; margin-bottom:10px">GESTIÓN DE LOTES</div>
                    <table class="lote-table">
                        <thead><tr><th>MEDICAMENTO</th><th>LOTE</th><th>CADUCIDAD</th><th>LABORATORIO</th></tr></thead>
                        <tbody>
                            ${CAT_DATA.map(m => `
                                <tr>
                                    <td><b>${m.nombre}</b></td>
                                    <td><input class="lote-input" value="${m.lot || ''}" onchange="updateLoteField('${m.id}', 'lot', this.value)"></td>
                                    <td><input class="lote-input" value="${m.cad || ''}" onchange="updateLoteField('${m.id}', 'cad', this.value)"></td>
                                    <td><input class="lote-input" value="${m.lab || ''}" onchange="updateLoteField('${m.id}', 'lab', this.value)"></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function imprimirEtiquetas() {
            const zone = document.getElementById('print-zone');
            const data = DOSIS_DATA.filter(d => d.tipo === currentTab && (currentSrv === 'TODOS' || d.servicio === currentSrv));
            data.sort((a,b) => a.cama.localeCompare(b.cama, undefined, {numeric: true}));
            const ms = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
            const fStr = `${new Date().getDate().toString().padStart(2,'0')}-${ms[new Date().getMonth()]}-${new Date().getFullYear().toString().slice(-2)}`;

            let h = '<table class="label-grid">';
            for (let i = 0; i < data.length; i += 4) {
                h += '<tr>';
                for (let j = 0; j < 4; j++) {
                    const d = data[i+j];
                    if(d) {
                        const medLimpio = d.medicamento.split(/\s\d/)[0].trim();
                        
                        // --- LÓGICA DE LIMPIEZA DE DECIMALES .0 ---
                        const volM_clean = Number(d.volM); // Elimina el .0 si es entero
                        const vmStr = (volM_clean > 0) ? ` - ${volM_clean}${d.dil ? " ML" : ""}` : "";
                        
                        h += `<td class="label-cell">
                            <p class="p-name">NOMBRE: ${d.nombre}</p>
                            <p class="bold">SERVICIO: ${d.servicio} &nbsp; CAMA: ${d.cama}</p>
                            <p>FECHA: ${fStr} &nbsp; E. RICARDO L.</p>
                            <p class="bold">${medLimpio} ${d.dosis} ${d.uni}${vmStr} ${d.via}${d.tie ? ' P/'+d.tie : ''}</p>
                            <p>${d.dil || ""}</p>
                            <p class="bold">VOL. FINAL: ${Number(d.volF)} ML &nbsp; HORARIO: ${d.horario}</p>
                        </td>`;
                    } else h += '<td></td>';
                }
                h += '</tr>';
            }
            zone.innerHTML = h + '</table>';
            window.print();
        }

        function setTab(t) { 
            currentTab = t; currentSrv = 'TODOS'; render(); 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active','active-prn','active-lotes')); 
            const cls = t === 'PRN' ? 'active-prn' : (t === 'LOTES' ? 'active-lotes' : 'active');
            document.getElementById(`tab-${t}`).classList.add(cls);
        }
        function updateLoteField(id, field, val) { db.collection("catalogo").doc(id).update({ [field]: val }); }
        function eliminar(id) { if(confirm("¿Eliminar?")) db.collection("dosis").doc(id).delete(); }
    </script>
</body>
</html>
